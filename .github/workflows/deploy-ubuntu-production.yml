# Deploys API + bot on your Oracle Cloud VM when production branch updates.
# Prerequisites: see docs/DEPLOY-ORACLE-VERCEL.md (clone repo on VM, .env, PM2, GitHub secrets).

name: Deploy API and bot (Oracle Cloud)

on:
  push:
    branches:
      - production
    # Optional: only run when backend-related paths change
    # paths:
    #   - 'apps/api/**'
    #   - 'apps/bot/**'
    #   - 'packages/**'
    #   - 'package-lock.json'
    #   - 'deploy/**'

concurrency:
  group: deploy-oci-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.OCI_SSH_HOST }}
          username: ${{ secrets.OCI_SSH_USER }}
          key: ${{ secrets.OCI_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            APP="${{ secrets.OCI_APP_PATH }}"
            if [ -z "$APP" ] || [ ! -d "$APP/.git" ]; then
              echo "OCI_APP_PATH secret must point to an existing git clone (see docs/DEPLOY-ORACLE-VERCEL.md)"
              exit 1
            fi
            cd "$APP"
            git fetch origin production
            git checkout production
            git reset --hard origin/production
            npm ci --omit=dev
            pm2 startOrReload deploy/ecosystem.config.cjs --update-env
            pm2 save
