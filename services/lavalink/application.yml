# Official reference: https://github.com/lavalink-devs/Lavalink/blob/master/LavalinkServer/application.yml.example
# Run: cd services/lavalink && java -jar ../../Lavalink.jar
# Password must match LAVALINK_PASSWORD in root .env (default youshallnotpass)

server:
  port: 2333
  address: 127.0.0.1
  http2:
    enabled: false

lavalink:
  server:
    password: "youshallnotpass"
    sources:
      youtube: false
      bandcamp: true
      soundcloud: true
      twitch: true
      vimeo: true
      nico: true
      http: true
      local: false

metrics:
  prometheus:
    enabled: false
    endpoint: /metrics

logging:
  file:
    path: ./logs/
  level:
    root: INFO
    lavalink: INFO
